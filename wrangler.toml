name = "method-passion-site"
compatibility_date = "2024-01-01"
pages_build_output_dir = "./dist"

[[d1_databases]]
binding = "DB"
database_name = "method-passion-db"
database_id = "e82eee17-893b-462e-9586-8a87c7c52f0f"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "method-passion-images"

# Secrets to configure via: npx wrangler secret put <SECRET_NAME>
# - RESEND_API_KEY: API key from resend.com
# - BACKUP_SECRET: Random secret for GitHub Actions cron authentication
